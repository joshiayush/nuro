site_name: joshiayush.ai
site_url: https://joshiayush.github.io/nuro
repo_url: https://github.com/joshiayush/nuro
repo_name: joshiayush/nuro

hooks:
  - hooks/notebooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - ask-ai:
      sections:
        "Documentation":
          - "*.md"
          - "*.ipynb"
  - mkdocs-jupyter:
      include_source: true
      execute: false
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members: true
            show_submodules: true

nav:
  - Home: index.md
  - Prework:
    - Mathematics:
        - Linear Algebra: prework/linear-algebra/Linear_Algebra.ipynb
        - Calculus: prework/calculus/Calculus.ipynb
        - Probability: prework/statistics/Probability.ipynb
        - Statistics: prework/statistics/Statistics.ipynb
    - NumPy:
        - NumPy Arrays: prework/Numpy/NumPy.ipynb
        - Image Processing: prework/Numpy/NumPy_Image_Processing.ipynb
    - PyTorch:
        - Tensors: prework/PyTorch/PyTorch.ipynb
    - Pandas:
        - DataFrame: prework/Pandas_DataFrame.ipynb
  - Machine Learning:
    - Prework:
        - Problem Framing: ml/prework/Problem_Framing.ipynb
    - Core:
        - Introduction to ML: ml/core/Introduction_to_ML.ipynb
        - Gradient Descent: ml/core/Gradient_Descent.ipynb
        - Generalization: ml/core/Generalization.ipynb
        - Training, Validation and Test Sets: ml/core/Training_Validation_and_Test_sets.ipynb
        - Representation: ml/core/Representation.ipynb
        - Feature Crosses: ml/core/Feature_Crosses.ipynb
        - Transform Your Data: ml/core/Transform_your_Data.ipynb
    - Models:
        - Linear Regression: ml/models/Linear_Regression.ipynb
  - Deep Learning:
    - Neural Networks: dl/Neural_Networks.ipynb
    - Backpropagation: dl/Backpropagation.ipynb
  - Projects:
    - Digits Classifier: projects/digits-classifier/digits_classification.ipynb
    - Salary Predictor: projects/salary-predictor/ds_salaries_analysis.ipynb
    - Face Recognition: projects/face-recognition/face_recognition.ipynb
  - API Reference:
    - linear_model: api/linear_model.md
    - naive_bayes: api/naive_bayes.md
    - svm: api/svm.md
    - stats: api/stats.md
    - neighbors: api/neighbors.md
    - search: api/search.md
    - boolalg: api/boolalg.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - js/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/extra.css
